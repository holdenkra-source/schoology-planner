<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schoology Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>📊 Overview</h2>
            <div class="stat-card">
                <span class="stat-number">3</span>
                <span class="stat-label">Quizzes This Week</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">150</span>
                <span class="stat-label">Total Points At Stake</span>
            </div>
            
            <div class="legend">
                <h3>Legend</h3>
                <div class="legend-item"><span class="dot exam"></span> Exam / Final</div>
                <div class="legend-item"><span class="dot quiz"></span> Quiz</div>
                <div class="legend-item"><span class="dot homework"></span> Homework</div>
                <div class="legend-item"><span class="dot project"></span> Presentation</div>
            </div>
        </aside>

        <main class="calendar-section">
            <header>
                <h1>📅 Smart Schoology Calendar</h1>
            </header>
            <div id="calendar"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
